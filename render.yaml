services:
  - type: web
    name: medicine-reminder
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false   # Set this in Render dashboard
      - key: SUPABASE_KEY
        sync: false   # Set this in Render dashboard
      - key: FLASK_DEBUG
        value: false
